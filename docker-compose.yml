services:
  postgres:
    image: postgres:16
    container_name: crm_database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/perfil_usuarios.csv:/docker-entrypoint-initdb.d/perfil_usuarios.csv
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - modelos:/app/models      
    depends_on:
      - postgres
  dashboard:
    build:
      context: ./dashboards
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data  
      - modelos:/app/models          
    depends_on:
      - api
volumes:
  modelos: